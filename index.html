<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thor Erik A</title>
<style>
/* ===== Styles with your palette ===== */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#011731; /* darkest */
  color:#82A3A1; /* light accent text */
  overflow:hidden;
}
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:10;
}
h1{
  font-size:60px;
  margin-bottom:30px;
  color:#9FC490; /* headline accent */
}
.search{
  width:400px;
  padding:15px;
  font-size:18px;
  border-radius:10px;
  border:none;
  background:#24364C;
  color:#82A3A1;
}
.search::placeholder{
  color:#465362;
}
.links{
  margin-top:40px;
}
.links a{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  background:#24364C;
  border-radius:8px;
  text-decoration:none;
  color:#82A3A1;
  transition:0.3s;
  box-shadow:0 0 5px #011936;
}
.links a:hover{
  background:#465362;
  color:#9FC490;
  transform:scale(1.1);
  box-shadow:0 0 15px #82A3A1;
}
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}
</style>
</head>

<body>

<div class="container">
  <h1>Thor Erik A</h1>

  <!-- Google search -->
  <form action="https://www.google.com/search" method="GET">
    <input class="search" type="text" name="q" placeholder="Search Google...">
  </form>

  <!-- Navigation -->
  <div class="links">
    <a href="/about/">About</a>
    <a href="/tools/">Tools</a>
  </div>
</div>

<canvas id="bg"></canvas>

<script>
// ===== Script with colored particles =====
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const colors = ["#011936","#24364C","#465362","#82A3A1","#9FC490"];
let particles = [];

for(let i=0;i<150;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*1,
    vy:(Math.random()-0.5)*1,
    color: colors[Math.floor(Math.random()*colors.length)],
    size: Math.random()*3+1
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    // wrap around edges
    if(p.x<0)p.x=canvas.width;
    if(p.x>canvas.width)p.x=0;
    if(p.y<0)p.y=canvas.height;
    if(p.y>canvas.height)p.y=0;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize',()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
