<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Webpage</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  overflow:hidden;
  height:100vh;
  color:white;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:10;
}

h1{
  font-size:60px;
  margin-bottom:30px;
  color:white;
}

/* Links styling */
.links a{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  background: rgba(0,0,0,0.3); /* darker than before */
  border-radius:8px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.links a:hover{
  background: rgba(0,0,0,0.5); /* slightly darker on hover */
  transform:scale(1.1);
}

/* Simple search bar */
.search-form input {
  padding: 12px 20px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
  outline: none;
  width: 300px;
  background: #7b95e4;
  color: #f2ecf8;
}

.search-form input::placeholder {
  color: #f3a5fe;
}

/* Canvas for gradient */
#bgCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
  <h1>A Website</h1>

  <!-- Simple Google Search Form -->
  <form class="search-form" action="https://www.google.com/search" method="GET" target="_blank">
    <input type="text" name="q" placeholder="Search Google...">
  </form>

  <div class="links">
    <a href="/about/">About</a>
    <a href="/tools/">Tools</a>
  </div>
</div>

<script>
// Linear gradient background animation
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const colors = ["#f57277","#7b95e4","#9b8cf3","#f2ecf8","#f3a5fe"];
let gradientAngle = 0;

function drawGradient(){
  const grad = ctx.createLinearGradient(
    0, 0,
    canvas.width*Math.cos(gradientAngle),
    canvas.height*Math.sin(gradientAngle)
  );
  for(let i=0;i<colors.length;i++){
    grad.addColorStop(i/(colors.length-1), colors[i]);
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  gradientAngle += 0.002;
  requestAnimationFrame(drawGradient);
}

drawGradient();

window.addEventListener('resize',()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
