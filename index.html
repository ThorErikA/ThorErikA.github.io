<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thor Erik A</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  overflow:hidden;
  height:100vh;
  background:black;
  color:white;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:10;
}

h1{
  font-size:60px;
  margin-bottom:30px;
  color:white;
}

.links a{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  background: rgba(255,255,255,0.1);
  border-radius:8px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.links a:hover{
  background: rgba(255,255,255,0.3);
  transform:scale(1.1);
}

#bgCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
<h1>Thor Erik A</h1>
<div class="links">
  <a href="/about/">About</a>
  <a href="/tools/">Tools</a>
</div>
</div>

<script>
// ===== Blob gradient background =====
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const colors = ["#f57277","#7b95e4","#9b8cf3","#f2ecf8","#f3a5fe"];
const blobs = [];

// create 10 blobs
for(let i=0;i<10;i++){
  blobs.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*200+150,
    color: colors[i%colors.length],
    dx: (Math.random()-0.5)*0.3,
    dy: (Math.random()-0.5)*0.3
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // draw each blob as radial gradient
  blobs.forEach(b=>{
    b.x += b.dx;
    b.y += b.dy;

    // bounce off edges
    if(b.x-b.r<0 || b.x+b.r>canvas.width) b.dx*=-1;
    if(b.y-b.r<0 || b.y+b.r>canvas.height) b.dy*=-1;

    const grad = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    grad.addColorStop(0,b.color);
    grad.addColorStop(1,'transparent');
    
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize',()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
