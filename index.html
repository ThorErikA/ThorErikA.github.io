<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thor Erik A</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  overflow:hidden;
  height:100vh;
  background: black;
  color:white;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:10;
}

h1{
  font-size:60px;
  margin-bottom:30px;
  color:white;
}

.links a{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  background: rgba(255,255,255,0.1);
  border-radius:8px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.links a:hover{
  background: rgba(255,255,255,0.3);
  transform:scale(1.1);
}

#bgCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
<h1>Thor Erik A</h1>
<div class="links">
  <a href="/about/">About</a>
  <a href="/tools/">Tools</a>
</div>
</div>

<script>
// Gradient animation
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const colors = ["#011731","#011936","#24364C","#465362","#82A3A1","#9FC490","#FF6B6B","#FFB56B","#6BFFB5"]; // black + example colors from gradient image
let gradientAngle = 0;

function drawGradient(){
  const grad = ctx.createLinearGradient(0,0,canvas.width*Math.cos(gradientAngle),canvas.height*Math.sin(gradientAngle));
  for(let i=0;i<colors.length;i++){
    grad.addColorStop(i/(colors.length-1),colors[i]);
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  gradientAngle += 0.002;
  requestAnimationFrame(drawGradient);
}

drawGradient();

window.addEventListener('resize',()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
